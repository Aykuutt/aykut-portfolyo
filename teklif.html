<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sorum Var</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 40px;
            text-align: center;
            max-width: 90%;
            transition: all 0.5s ease;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #d81b60;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        #btn-yes {
            background-color: #ff4081;
            color: white;
            font-size: 18px;
            padding: 12px 30px;
            position: relative;
            z-index: 20;
        }

        #btn-yes:hover {
            background-color: #f50057;
            transform: scale(1.05);
        }

        #btn-no {
            background-color: #ffffff;
            color: #ff4081;
            font-size: 18px;
            padding: 12px 30px;
        }

        #btn-no:hover {
            background-color: #f8bbd0;
        }

        .fullscreen-yes {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0 !important;
            font-size: 10vw !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            z-index: 100 !important;
            margin: 0 !important;
        }

        .hidden {
            display: none !important;
        }

        #message {
            color: #c2185b;
            font-size: 3em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.7);
            animation: heartbeat 1.5s infinite;
            text-align: center;
            padding: 20px;
        }

        @keyframes heartbeat {
            0% {
                transform: scale(1);
            }

            14% {
                transform: scale(1.1);
            }

            28% {
                transform: scale(1);
            }

            42% {
                transform: scale(1.1);
            }

            70% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="glass-container" id="main-container">
        <h1 id="question">Beni seviyormusun? 💖</h1>
        <div class="buttons" id="btn-container">
            <button id="btn-yes">Evet</button>
            <button id="btn-no">Hayır</button>
        </div>
    </div>

    <div id="message" class="hidden">
        Biliyordum! Seni Çok Seviyorum ❤️
    </div>

    <script>
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const mainContainer = document.getElementById('main-container');
        const message = document.getElementById('message');

        let yesSize = 18;
        let yesPaddingV = 12;
        let yesPaddingH = 30;

        btnNo.addEventListener('click', () => {
            yesSize += 30;
            yesPaddingV += 15;
            yesPaddingH += 25;

            // Hayır butonunun metni artık değişmiyor, sadece "Hayır" kalıyor.

            if (yesSize > 200) {
                btnYes.classList.add('fullscreen-yes');
                btnYes.style.fontSize = '';
                btnYes.style.padding = '';
                btnYes.innerText = "EVET!";
            } else {
                btnYes.style.fontSize = yesSize + 'px';
                btnYes.style.padding = `${yesPaddingV}px ${yesPaddingH}px`;
            }
        });

        btnYes.addEventListener('click', () => {
            mainContainer.classList.add('hidden');
            btnYes.classList.add('hidden'); // fullscreen ise gizlemek için
            message.classList.remove('hidden');
        });
    </script>
</body>

</html>
